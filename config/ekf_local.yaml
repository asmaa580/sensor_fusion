ekf_local:
  ros__parameters:

    frequency: 15.0
    sensor_timeout: 0.1
    two_d_mode: true

    publish_tf: true

    use_sim_time: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom  

    odometry_topic: /odometry/filtered 

    # Camera odometry
    #odom0: /camera/odom
    odom0: /odom
    odom0_config: [true, true, false,
                   false, false, true,
                   true, true, false,
                   false, false, true,
                   false, false, false]

    # IMU
    #imu0: /imu/data
    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]

    imu0_remove_gravitational_acceleration: true

    